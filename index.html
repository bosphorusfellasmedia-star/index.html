<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#efc900",
              "outline": "#757777",
              "secondary-container": "#ffd709",
              "background": "#f6f6f6",
              "inverse-on-surface": "#9c9d9d",
              "inverse-surface": "#0c0f0f",
              "on-error": "#ffefef",
              "on-tertiary": "#fff2cd",
              "tertiary-fixed-dim": "#efc900",
              "error-dim": "#a70138",
              "surface-container-lowest": "#ffffff",
              "tertiary-dim": "#5e4e00",
              "on-tertiary-fixed": "#453900",
              "outline-variant": "#acadad",
              "surface-variant": "#dbdddd",
              "surface-container-low": "#f0f1f1",
              "secondary-fixed": "#ffd709",
              "error": "#b41340",
              "on-secondary": "#fff2cd",
              "secondary-dim": "#5e4e00",
              "surface": "#f6f6f6",
              "surface-container-high": "#e1e3e3",
              "surface-tint": "#b50058",
              "on-secondary-container": "#5b4b00",
              "primary-container": "#ff709e",
              "on-primary-container": "#4c0021",
              "surface-bright": "#f6f6f6",
              "on-background": "#2d2f2f",
              "on-primary-fixed": "#000000",
              "on-primary-fixed-variant": "#5d002a",
              "on-primary": "#ffeff1",
              "tertiary": "#6c5a00",
              "inverse-primary": "#ff4a8d",
              "error-container": "#f74b6d",
              "surface-dim": "#d2d5d5",
              "on-tertiary-fixed-variant": "#665500",
              "on-surface-variant": "#5a5c5c",
              "primary-fixed": "#ff709e",
              "secondary": "#6c5a00",
              "on-error-container": "#510017",
              "primary-fixed-dim": "#ff5290",
              "tertiary-fixed": "#ffd709",
              "surface-container-highest": "#dbdddd",
              "on-tertiary-container": "#5b4b00",
              "on-secondary-fixed-variant": "#665500",
              "primary": "#b50058",
              "primary-dim": "#9f004d",
              "surface-container": "#e7e8e8",
              "on-surface": "#2d2f2f",
              "on-secondary-fixed": "#453900",
              "tertiary-container": "#ffd709"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 backdrop-blur-md shadow-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-fuchsia-600" data-icon="favorite">favorite</span>
</div>
<h1 class="font-serif text-xl font-bold tracking-tight text-fuchsia-700">Gizem &amp; Egemen</h1>
<div class="flex items-center">
<span class="material-symbols-outlined text-fuchsia-600" data-icon="celebration">celebration</span>
</div>
</nav>
<!-- Main Content Canvas (Optimized for no-scroll on iPhone) -->
<main class="h-screen pt-16 pb-24 px-4 flex flex-col justify-center items-center">
<!-- The "Modern Gala" Card Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-lg p-6 shadow-[0px_20px_40px_rgba(181,0,88,0.08)] flex flex-col gap-4 relative overflow-hidden">
<!-- Abstract Graphic / Subtle Ring Image -->
<div class="absolute -top-6 -right-6 w-24 h-24 bg-gradient-to-br from-secondary-container to-primary-container opacity-20 rounded-full blur-xl"></div>
<header class="text-center space-y-1">
<p class="font-label text-xs font-bold tracking-[0.2em] text-secondary uppercase">İsteme, Söz ve Nişan</p>
<h2 class="font-headline text-2xl font-bold text-primary leading-tight">Gizem &amp; Egemen</h2>
<p class="font-body text-sm text-on-surface-variant font-semibold">Gündüz &amp; Tutmuş Aileleri</p>
<div class="inline-flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded-full mt-2">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="calendar_today">calendar_today</span>
<span class="font-label text-sm font-bold text-on-surface">9 Mayıs 2026</span>
</div>
</header>
<!-- Small Cropped Image for Context -->
<div class="w-full h-24 rounded-lg overflow-hidden">
<img alt="Gold wedding rings on silk" class="w-full h-full object-cover grayscale-[0.2] sepia-[0.1]" data-alt="Close-up of two elegant gold wedding bands resting on a luxurious ivory silk fabric with soft dramatic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY5yfaT4zCAUiDQQNVCb544gJvIiBZkBRNVJLLSoDeeoievLBMrJCl6SLsjye4UoR2ACZxHqjQlrzECxF0asag2ipcAckX6HKw_kUPGo8pCQMJeE8sbt49mc0PB04DZYFfFudDxUdwe_wQOcqgLILQGZSDycaiRHeCUQBnQIpx4xeVgKcXvU_C3G1veh9oGFlkptmeTUujGCcWFxEklIT_ni8L58U40SKn9IB1jhVO5rD68dS-33kRhSzx64MV3IAMsDNY_GKOwS4x"/>
</div>
<!-- Interaction Form -->
<div class="space-y-4">
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold text-primary z-10 uppercase tracking-wider">Adınız Soyadınız</label>
<input class="w-full h-14 bg-surface-container-high border-none rounded-md px-4 pt-2 font-body text-base focus:ring-2 focus:ring-secondary-fixed transition-all placeholder:text-zinc-400" placeholder="Örn: Ahmet Yılmaz" type="text"/>
</div>
<div class="relative">
<label class="absolute -top-2 left-3 bg-surface-container-lowest px-1 text-[10px] font-bold text-primary z-10 uppercase tracking-wider">Kişi Sayısı</label>
<select class="w-full h-14 bg-surface-container-high border-none rounded-md px-4 pt-2 font-body text-base focus:ring-2 focus:ring-secondary-fixed appearance-none">
<option>1 Kişi</option>
<option>2 Kişi</option>
<option>3 Kişi</option>
<option>4+ Kişi</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 pointer-events-none text-zinc-400" data-icon="expand_more">expand_more</span>
</div>
<!-- Primary Action Pair -->
<div class="grid grid-cols-2 gap-3 h-14">
<button class="bg-gradient-to-br from-fuchsia-600 to-pink-500 text-white font-bold rounded-md flex items-center justify-center gap-2 shadow-lg shadow-fuchsia-200 active:scale-95 transition-transform text-sm md:text-base">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                        Katılıyorum
                    </button>
<button class="bg-surface-container-high text-on-surface-variant font-bold rounded-md flex items-center justify-center gap-2 active:scale-95 transition-transform text-sm md:text-base">
<span class="material-symbols-outlined" data-icon="cancel">cancel</span>
                        Katılmıyorum
                    </button>
</div>
<!-- Media Upload Action -->
<button class="w-full h-14 border-2 border-dashed border-primary/30 bg-primary/5 text-primary font-bold rounded-md flex items-center justify-center gap-3 hover:bg-primary/10 transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="cloud_upload">cloud_upload</span>
                    Fotoğraf/Video Yükle
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-white/70 backdrop-blur-md rounded-t-3xl shadow-[0px_-10px_30px_rgba(181,0,88,0.1)]">
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-fuchsia-600 to-pink-500 text-white rounded-full p-3 shadow-lg shadow-fuchsia-200 active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-sans text-[10px] font-semibold tracking-wide">Davetiye</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 p-2 hover:text-fuchsia-500 transition-colors active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
<span class="font-sans text-[10px] font-semibold tracking-wide">Konum</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 p-2 hover:text-fuchsia-500 transition-colors active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="cloud_upload">cloud_upload</span>
<span class="font-sans text-[10px] font-semibold tracking-wide">Yükle</span>
</div>
</nav>
</body></html>
